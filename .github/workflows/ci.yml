name: CI

# Every PR and every push to main must type-check and build cleanly.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (runs tsc --noEmit, then vite build)
        run: npm run build

      - name: Validate camera JSON files
        run: |
          for f in src/content/cameras/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('valid: $f')"
          done
